spring:
  application:
    name: gateway
  cloud:
    config:
      uri: http://localhost:8888
      fail-fast: false
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: zone-service
          uri: lb://zone-service
          predicates:
            - Path=/api/zones/**
        - id: sensor-service
          uri: lb://sensor-service
          predicates:
            - Path=/api/sensors/**
        - id: automation-service
          uri: lb://automation-service
          predicates:
            - Path=/api/automation/**
        - id: crop-service
          uri: lb://crop-service
          predicates:
            - Path=/api/crops/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    gateway:
      enabled: true

logging:
  level:
    com.agms.gateway: DEBUG
    org.springframework.cloud.gateway: INFO

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

server:
  port: 8080

# jwt.secret and route config are served by Config Server (config/gateway.yml)
# Fallback values in case Config Server is unavailable:
jwt:
  secret: agmsSecretKey1234567890ABCDEFGHIJKLMnopqrstuvwxyz
